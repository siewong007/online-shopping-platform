# Production stack for ekowayhardware.com on the shared Lightsail VPS that
# already runs payroll (native, :8080) and saliminn.my (Docker, :3030/:8081).
#
# The host-level Caddy process owns ports 80/443. Every port here is bound to
# loopback, so only Caddy (or an administrator on the VPS) can reach it. This
# stack uses :4000 and :8082 with online-shopping-specific names. Its
# PostgreSQL port is not published at all; maintenance uses
# `docker exec online-shopping-db`.
#
# The box has ~1GB total RAM shared across three applications, so every
# service below sets a hard mem_limit: it protects payroll and saliminn from
# this stack rather than letting the kernel OOM-killer pick an arbitrary
# victim if this app misbehaves.
#
# deploy.sh supplies IMAGE_TAG and POSTGRES_PASSWORD. Images are loaded
# directly from a release bundle; no registry or additional AWS service is
# involved.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:19beta1
    container_name: online-shopping-db
    restart: unless-stopped
    command:
      - postgres
      - -c
      - max_connections=20
      - -c
      - shared_buffers=24MB
      - -c
      - work_mem=1MB
      - -c
      - maintenance_work_mem=16MB
      - -c
      - max_parallel_workers=1
    environment:
      POSTGRES_USER: shop_admin
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      POSTGRES_DB: online_shopping
    volumes:
      - postgres_data:/var/lib/postgresql
      # Applied by the official image only while postgres_data is empty.
      - /opt/online-shopping/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop_admin -d online_shopping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    shm_size: 32mb
    mem_limit: 160m
    cpus: 0.25
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 60s
    logging: *default-logging
    networks:
      - database

  backend:
    image: "online-shopping-backend:${IMAGE_TAG:?IMAGE_TAG is required}"
    container_name: online-shopping-backend
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "4000"
      DATABASE_URL: "postgres://shop_admin:${POSTGRES_PASSWORD}@postgres:5432/online_shopping"
      FRONTEND_ORIGIN: "https://ekowayhardware.com"
      RUST_LOG: warn
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/api/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    mem_limit: 128m
    cpus: 0.35
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 20s
    logging: *default-logging
    networks:
      - app
      - database

  frontend:
    image: "online-shopping-frontend:${IMAGE_TAG:?IMAGE_TAG is required}"
    container_name: online-shopping-frontend
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:8082:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    mem_limit: 48m
    cpus: 0.10
    pids_limit: 128
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 10s
    logging: *default-logging
    networks:
      - app

volumes:
  postgres_data:
    driver: local

networks:
  app:
    driver: bridge
  database:
    # Only the backend is dual-homed. PostgreSQL has no Internet-facing Docker
    # network and no published host port.
    internal: true
