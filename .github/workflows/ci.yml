name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:19beta1
        env:
          POSTGRES_USER: project_depot
          POSTGRES_PASSWORD: project_depot
          POSTGRES_DB: project_depot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U project_depot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://project_depot:project_depot@localhost:5432/project_depot
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Apply database migrations
        run: |
          for file in migrations/*.sql; do
            echo "Applying $file"
            PGPASSWORD=project_depot psql -v ON_ERROR_STOP=1 -h localhost -U project_depot -d project_depot -f "$file"
          done

      - name: Run tests
        run: cargo test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build